<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bracketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#151b2f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="url(#bgGrad)" rx="14"/>
  
  <!-- Left bracket < (pointing right) -->
  <path d="M 12 32 L 26 50 L 12 68" stroke="url(#bracketGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Text: A.A with gradient and monospace font -->
  <text x="50" y="60" font-size="38" font-weight="600" fill="url(#bracketGrad)" text-anchor="middle" font-family="'Monaco', 'Courier New', monospace" letter-spacing="0.5">A.A</text>
  
  <!-- Right bracket > (pointing left) -->
  <path d="M 88 32 L 74 50 L 88 68" stroke="url(#bracketGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
